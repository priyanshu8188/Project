<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aloft — Weather, plainly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="theme-clear-day">

<div class="app">
  <header>
    <div class="brand">
      <h1>Aloft</h1>
      <span>weather, plainly</span>
    </div>

    <div class="search-wrap">
      <div class="search-bar">
        <button class="icon-btn" id="locateBtn" aria-label="Use my location" title="Use my location">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        </button>
        <input id="searchInput" type="text" placeholder="Search a city…" autocomplete="off" aria-label="Search for a city">
        <button class="icon-btn" id="searchBtn" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
      </div>
      <div class="suggestions" id="suggestions"></div>
    </div>

    <div class="unit-toggle" role="group" aria-label="Temperature unit">
      <button id="unitC" class="active" aria-pressed="true">°C</button>
      <button id="unitF" aria-pressed="false">°F</button>
    </div>
  </header>

  <div id="content">
    <div class="state-msg" id="stateMsg">Finding somewhere to start…</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
